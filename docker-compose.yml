# =============================================================================
# AGC Assessors - Docker Compose
# Uses serversideup/php (PHP 8.4 + Nginx bundled, no custom Dockerfile needed)
# IMPORTANT: PostgreSQL is external — configure DB_HOST in .env
# =============================================================================

services:
  # PHP 8.4 + Nginx (bundled via serversideup/php)
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: agc-php
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./:/var/www/html
    networks:
      - agc-network
      - db_network
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # PHP settings
      PHP_MEMORY_LIMIT: "512M"
      PHP_UPLOAD_MAX_FILE_SIZE: "64M"
      PHP_POST_MAX_SIZE: "64M"
      PHP_MAX_EXECUTION_TIME: "300"
      PHP_OPCACHE_ENABLE: "1"
      # Xdebug
      PHP_XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      PHP_XDEBUG_CLIENT_HOST: "host.docker.internal"
      PHP_XDEBUG_CLIENT_PORT: "9003"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Node.js for Vite / Asset Building
  node:
    image: node:24-alpine
    container_name: agc-node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - node-modules:/var/www/html/node_modules
    networks:
      - agc-network
    ports:
      - "${VITE_PORT:-5173}:5173"
    command: ["sh", "-c", "npm install -g pnpm && pnpm install && pnpm run dev"]
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development

  # Redis (Cache, Sessions, Queue)
  redis:
    image: redis:7-alpine
    container_name: agc-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - agc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailpit (Email catching for development)
  mailpit:
    image: axllent/mailpit:latest
    container_name: agc-mailpit
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - agc-network

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: agc-queue
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - ./:/var/www/html
    networks:
      - agc-network
      - db_network
    depends_on:
      - redis
    profiles:
      - queue

  # Scheduler (cron)
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: agc-scheduler
    working_dir: /var/www/html
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    volumes:
      - ./:/var/www/html
    networks:
      - agc-network
      - db_network
    depends_on:
      - redis
    profiles:
      - scheduler

volumes:
  redis-data:
  node-modules:

networks:
  agc-network:
    driver: bridge
    name: agc-network
  db_network:
    external: true
    name: db_network
